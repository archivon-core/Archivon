<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill:#f7f8fa; }
      .card { fill:#ffffff; stroke:#dfe3e8; stroke-width:1.2; filter:url(#shadow); }
      .cardSoft { fill:#ffffff; stroke:#e5e7eb; stroke-width:1.1; }
      .title { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:30px; font-weight:700; fill:#111827; }
      .h1 { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:26px; font-weight:700; fill:#111827; }
      .h2 { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:20px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:16px; fill:#374151; }
      .small { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:13px; fill:#6b7280; }
      .mono { font-family:"SFMono-Regular","Consolas",monospace; font-size:14px; fill:#374151; }
      .muted { fill:#6b7280; }
      .line { stroke:#e5e7eb; stroke-width:1; }
      .btn { fill:#ffffff; stroke:#d1d5db; stroke-width:1.2; }
      .btnDanger { fill:#fff; stroke:#ef4444; stroke-width:1.2; }
      .dangerText { fill:#dc2626; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:16px; font-weight:600; }
      .greenText { fill:#15803d; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:14px; font-weight:700; }
      .badge { fill:#f3f4f6; stroke:#d1d5db; stroke-width:1; }
      .badgeOk { fill:#eaf7ee; stroke:#86c993; stroke-width:1; }
      .badgeWarn { fill:#fff7ed; stroke:#fdba74; stroke-width:1; }
      .badgeDanger { fill:#fef2f2; stroke:#fca5a5; stroke-width:1; }
      .selected { fill:#f0f9f2; stroke:#16a34a; stroke-width:1.6; }
      .terminal { fill:#0f171a; stroke:#111827; stroke-width:1; }
      .termText { font-family:"SFMono-Regular","Consolas",monospace; font-size:15px; fill:#e5e7eb; }
      .termGreen { font-family:"SFMono-Regular","Consolas",monospace; font-size:15px; fill:#86efac; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
<rect x="0" y="0" width="1600" height="96" rx="0" class="cardSoft"/>
<text x="32" y="38" class="small">Archivon</text>
<text x="32" y="74" class="title">Archivon</text>
<rect x="520" y="250" width="560" height="400" rx="18" class="card"/>
<text x="562" y="312" class="h1">Change Temporary Password</text>
<text x="562" y="370" class="small">Current password</text>
<rect x="562" y="384" width="476" height="48" rx="10" class="btn"/>
<text x="580" y="415" class="text">••••••••</text>
<text x="562" y="460" class="small">New password</text>
<rect x="562" y="474" width="476" height="48" rx="10" class="btn"/>
<text x="580" y="505" class="text">••••••••••</text>
<rect x="562" y="570" width="476" height="48" rx="8" class="btn"/>
<text x="800.0" y="600.0" class="text" text-anchor="middle">Save</text>
</svg>