      .badgeWarn { fill:#fff7ed; stroke:#fdba74; stroke-width:1; }
      .badgeDanger { fill:#fef2f2; stroke:#fca5a5; stroke-width:1; }
      .selected { fill:#f0f9f2; stroke:#16a34a; stroke-width:1.6; }
      .terminal { fill:#0f171a; stroke:#111827; stroke-width:1; }
      .termText { font-family:"SFMono-Regular","Consolas",monospace; font-size:15px; fill:#e5e7eb; }
      .termGreen { font-family:"SFMono-Regular","Consolas",monospace; font-size:15px; fill:#86efac; }
