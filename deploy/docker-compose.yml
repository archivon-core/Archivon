services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archivon}
      POSTGRES_USER: ${POSTGRES_USER:-archivon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      ARCHIVON_ENV: ${ARCHIVON_ENV:-dev}
      ARCHIVON_API_ADDR: ":8080"
      ARCHIVON_COMPUTE_STRATUM_ADDR: ":3333"
      ARCHIVON_STORAGE_PATH: /var/lib/archivon/storage
      ARCHIVON_MASTER_KEY_PATH: /run/archivon/master.key
      ARCHIVON_KMS_PROVIDER: ${ARCHIVON_KMS_PROVIDER:-local-file}
      ARCHIVON_KMS_KEY_ID: ${ARCHIVON_KMS_KEY_ID:-local-master-v1}
      ARCHIVON_MIGRATIONS_PATH: /opt/archivon/migrations
      ARCHIVON_AUTH_SESSION_TTL_HOURS: ${ARCHIVON_AUTH_SESSION_TTL_HOURS:-12}
      ARCHIVON_COOKIE_SECURE: ${ARCHIVON_COOKIE_SECURE:-false}
      ARCHIVON_DATABASE_DSN: postgres://${POSTGRES_USER:-archivon}:${POSTGRES_PASSWORD:-change_me_local_dev}@postgres:5432/${POSTGRES_DB:-archivon}?sslmode=disable
    volumes:
      - ../storage:/var/lib/archivon/storage
      - ../logs:/var/log/archivon
      - ../secrets:/run/archivon:ro
    ports:
      - "${ARCHIVON_STRATUM_PORT:-3333}:3333"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${ARCHIVON_HTTP_PORT:-8088}:80"
      - "${ARCHIVON_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/archivon_locations.conf:/etc/nginx/conf.d/archivon_locations.conf:ro
      - ../secrets/tls:/etc/nginx/tls:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
