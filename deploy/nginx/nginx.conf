events {}

http {
  server_tokens off;

  upstream archivon_api {
    server api:8080;
  }

  upstream archivon_web {
    server web:80;
  }

  server {
    listen 80;
    server_name _;

    include /etc/nginx/conf.d/archivon_locations.conf;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/tls/archivon.crt;
    ssl_certificate_key /etc/nginx/tls/archivon.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ARCHIVONSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    include /etc/nginx/conf.d/archivon_locations.conf;
  }
}
